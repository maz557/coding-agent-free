<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Agent Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  #model-info { font-size: 12px; color: #8b949e; margin-left: auto; }
  #model-select { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 8px; font-size: 13px; }
  #reset-btn { background: #21262d; color: #f85149; border: 1px solid #30363d; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  #reset-btn:hover { background: #30363d; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-start; background: #1f6feb; color: #fff; border-bottom-left-radius: 4px; }
  .msg.assistant { align-self: flex-end; background: #161b22; border: 1px solid #30363d; border-bottom-right-radius: 4px; }
  .msg.tool { align-self: flex-end; background: #0d1117; border: 1px solid #21262d; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; color: #8b949e; max-width: 100%; }
  .msg.tool .tool-name { color: #58a6ff; font-weight: 600; }
  .msg.tool .tool-result { color: #7ee787; margin-top: 4px; }
  .msg.error { align-self: flex-end; background: #3d1f1f; border: 1px solid #f85149; color: #ff7b72; }
  .msg.model { align-self: flex-end; font-size: 11px; color: #8b949e; background: transparent; border: none; padding: 2px 14px; }
  .msg .timestamp { font-size: 10px; color: #484f58; margin-top: 4px; text-align: left; direction: ltr; }
  .msg.user .timestamp { color: rgba(255,255,255,0.6); }
  .streaming-cursor::after { content: '▊'; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #input-area { background: #161b22; border-top: 1px solid #30363d; padding: 12px 16px; display: flex; gap: 8px; flex-shrink: 0; }
  #input { flex: 1; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; resize: none; font-family: inherit; }
  #input:focus { border-color: #58a6ff; }
  #send-btn { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
  #send-btn:hover { background: #2ea043; }
  #send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  #status { font-size: 12px; color: #8b949e; padding: 4px 16px 8px; flex-shrink: 0; }
  pre { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 12px; overflow-x: auto; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; direction: ltr; text-align: left; margin: 8px 0; }
  code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; background: #21262d; padding: 2px 6px; border-radius: 4px; }
  pre code { background: none; padding: 0; }
  .cmd { color: #ffa657; }
  .output { color: #7ee787; }
</style>
</head>
<body>
<div id="header">
  <h1>Coding Agent</h1>
  <select id="model-select"></select>
  <input id="model-name-input" type="text" placeholder="model name..." style="display:none;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-size:12px;width:180px;direction:ltr">
  <button id="apply-model-btn" style="display:none;background:#21262d;color:#58a6ff;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer">Apply</button>
  <span id="model-info"></span>
  <button id="safe-mode-btn" style="background:#21262d;color:#ffa657;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer" title="Toggle safe mode (restrict shell commands)">🛡️</button>
  <button id="reset-btn" style="background:#21262d;color:#f85149;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer">Reset</button>
</div>
<div id="toolbar" style="background:#0d1117;border-bottom:1px solid #30363d;padding:4px 16px;display:flex;align-items:center;gap:8px;font-size:11px;flex-shrink:0">
  <span id="safe-status" style="color:#8b949e">Safe: OFF</span>
  <input id="allow-input" type="text" placeholder="/allow path..." style="background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:2px 6px;font-size:11px;width:200px;direction:ltr">
  <button id="allow-btn" style="background:#21262d;color:#58a6ff;border:1px solid #30363d;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer">Allow</button>
</div>
<div id="chat"></div>
<div id="status">Ready</div>
<div id="input-area">
  <textarea id="input" rows="2" placeholder="Type your message..." dir="ltr"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
let sessionId = null;
let isStreaming = false;
let safeModeOn = false;
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const resetBtn = document.getElementById('reset-btn');
const modelSelect = document.getElementById('model-select');
const modelNameInput = document.getElementById('model-name-input');
const applyModelBtn = document.getElementById('apply-model-btn');
const modelInfo = document.getElementById('model-info');
const status = document.getElementById('status');
const safeModeBtn = document.getElementById('safe-mode-btn');
const safeStatus = document.getElementById('safe-status');
const allowInput = document.getElementById('allow-input');
const allowBtn = document.getElementById('allow-btn');

async function populateModels() {
  const res = await fetch('/api/models');
  const items = await res.json();
  let html = '<optgroup label="— Presets —">';
  for (const m of items) {
    if (m.type === 'preset')
      html += `<option value="preset:${m.id}">${m.provider} — ${m.model}</option>`;
  }
  html += '</optgroup><optgroup label="— Providers (custom model) —">';
  for (const m of items) {
    if (m.type === 'provider')
      html += `<option value="provider:${m.id}" data-default-model="${m.defaultModel}">${m.label}</option>`;
  }
  html += '</optgroup>';
  modelSelect.innerHTML = html;
}

async function init() {
  const res = await fetch('/api/session', { method: 'POST' });
  const data = await res.json();
  sessionId = data.sessionId;
  await populateModels();

  const [activeRes, safeRes] = await Promise.all([
    fetch(`/api/active/${sessionId}`),
    fetch('/api/safe-mode'),
  ]);
  const active = await activeRes.json();
  const safe = await safeRes.json();
  safeModeOn = safe.enabled;
  updateSafeUI();
  modelInfo.textContent = `${active.provider} / ${active.model}`;
  // select matching preset
  for (const opt of modelSelect.options)
    if (opt.value === 'preset:1') { opt.selected = true; break; }
}

function updateSafeUI() {
  safeStatus.textContent = safeModeOn ? '🛡️ Safe: ON' : 'Safe: OFF';
  safeModeBtn.style.color = safeModeOn ? '#7ee787' : '#ffa657';
}

function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function updateLastMessage(role, html) {
  const msgs = chat.querySelectorAll(`.msg.${role}`);
  if (msgs.length) {
    msgs[msgs.length - 1].innerHTML = html;
    chat.scrollTop = chat.scrollHeight;
  }
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg || isStreaming) return;
  input.value = '';
  isStreaming = true;
  sendBtn.disabled = true;
  status.textContent = 'Processing...';
  addMessage('user', `${escapeHtml(msg)}<div class="timestamp">${new Date().toLocaleTimeString()}</div>`);

  const controller = new AbortController();
  const timeoutId = setTimeout(() => { controller.abort(); status.textContent = 'Timed out'; }, 60000);

  try {
    const res = await fetch(`/api/chat/${sessionId}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }), signal: controller.signal,
    });

    if (!res.ok) {
      const text = await res.text().catch(() => res.statusText);
      addMessage('error', `⚠️ Server error (${res.status}): ${text}`);
      streamDone(); return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let assistantContent = '';
    const msgDiv = addMessage('assistant', '');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';

      for (const part of parts) {
        const lines = part.split('\n');
        let event = '', data = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) event = line.slice(7).trim();
          if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (!event || !data) continue;
        try {
          const parsed = JSON.parse(data);
          switch (event) {
            case 'token':
              assistantContent += parsed.token;
              msgDiv.innerHTML = escapeHtml(assistantContent) + '<span class="streaming-cursor"></span>';
              break;
            case 'tool_call':
              addMessage('tool', `<span class="tool-name">🔧 ${escapeHtml(parsed.name)}</span><br><span class="cmd">${escapeHtml(parsed.args)}</span>`);
              break;
            case 'tool_result':
              updateLastMessage('tool', `<span class="tool-name">✅ ${escapeHtml(parsed.name)}</span><br><span class="tool-result">${escapeHtml(parsed.content.slice(0, 300))}${parsed.content.length > 300 ? '...' : ''}</span>`);
              break;
            case 'model':
              modelInfo.textContent = parsed.model;
              break;
            case 'status':
              status.textContent = parsed.text;
              break;
            case 'error':
              addMessage('error', `⚠️ ${escapeHtml(parsed.message)}`);
              break;
            case 'done':
              clearTimeout(timeoutId);
              msgDiv.innerHTML = escapeHtml(assistantContent) || '✅ Done';
              if (parsed.toolCallsCount > 0)
                msgDiv.innerHTML += `<div class="timestamp">${parsed.toolCallsCount} tool call(s)</div>`;
              streamDone(); return;
          }
        } catch (e) { /* skip malformed json */ }
      }
    }
    clearTimeout(timeoutId);
    msgDiv.innerHTML = escapeHtml(assistantContent) || '✅ Done';
    streamDone();
  } catch (err) {
    clearTimeout(timeoutId);
    addMessage('error', `🚨 ${err.name === 'AbortError' ? 'Request timed out (60s)' : err.message}`);
    streamDone();
  }
}

function streamDone() {
  isStreaming = false; sendBtn.disabled = false; status.textContent = 'Ready'; input.focus();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Events
sendBtn.addEventListener('click', sendMessage);

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

resetBtn.addEventListener('click', async () => {
  if (!confirm('Reset conversation?')) return;
  await fetch(`/api/reset/${sessionId}`, { method: 'POST' });
  chat.innerHTML = '';
  status.textContent = 'Conversation reset';
  addMessage('assistant', '🔄 Conversation cleared. Start fresh!');
});

function showModelInput(show, defaultModel) {
  modelNameInput.style.display = show ? 'inline' : 'none';
  applyModelBtn.style.display = show ? 'inline' : 'none';
  if (show) { modelNameInput.value = defaultModel || ''; modelNameInput.focus(); }
}

async function switchModel(payload) {
  await fetch(`/api/model/${sessionId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const activeRes = await fetch(`/api/active/${sessionId}`);
  const active = await activeRes.json();
  modelInfo.textContent = `${active.provider} / ${active.model}`;
  addMessage('assistant', `🔄 Switched to <strong>${active.provider} — ${active.model}</strong>`);
}

modelSelect.addEventListener('change', async (e) => {
  const val = e.target.value;
  if (val.startsWith('preset:')) {
    showModelInput(false);
    await switchModel({ presetId: val.slice(7) });
  } else if (val.startsWith('provider:')) {
    const provId = val.slice(9);
    const opt = e.target.selectedOptions[0];
    const defaultModel = opt.getAttribute('data-default-model') || '';
    showModelInput(true, defaultModel);
  }
});

applyModelBtn.addEventListener('click', async () => {
  const val = modelSelect.value;
  if (!val.startsWith('provider:')) return;
  const provId = val.slice(9);
  const modelName = modelNameInput.value.trim();
  if (!modelName) { status.textContent = 'Please enter a model name'; return; }
  await switchModel({ provider: provId, model: modelName });
  showModelInput(false);
});

modelNameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applyModelBtn.click();
});

safeModeBtn.addEventListener('click', async () => {
  safeModeOn = !safeModeOn;
  await fetch('/api/safe-mode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled: safeModeOn }),
  });
  updateSafeUI();
  addMessage('assistant', `🛡️ Safe mode ${safeModeOn ? 'enabled' : 'disabled'}`);
});

allowBtn.addEventListener('click', async () => {
  const p = allowInput.value.trim();
  if (!p) return;
  await fetch('/api/allow', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: p }),
  });
  addMessage('assistant', `📁 Path allowed: <code>${escapeHtml(p)}</code>`);
  allowInput.value = '';
});

allowInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') allowBtn.click();
});

init();
</script>
</body>
</html>
